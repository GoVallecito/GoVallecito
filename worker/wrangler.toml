name = "govallecito-conditions"
main = "conditions-worker.js"
compatibility_date = "2026-01-01"

# 15-minute conditions refresh + a weekly "This week on the water" summary.
# 0 13 * * SUN = 13:00 UTC = 6:00 AM MST (note: lands 7:00 AM during daylight time —
# Cloudflare crons are UTC-fixed; use 12:00 UTC if David prefers 6 AM summer clock).
[triggers]
crons = ["*/15 * * * *", "0 13 * * SUN"]

# Production data route: the Worker owns GET /data/conditions.json on the live
# domain and serves it from KV (its fetch handler already does this). A Worker
# route on the same zone takes precedence over the Cloudflare Pages static site
# for this one path, so the site keeps reading same-origin /data/conditions.json
# with live data, while Pages serves everything else statically.
# Requires the custom domain (govallecito.com) to be on this Cloudflare account.
# Uncomment after the domain is added; update the zone_name if different.
# routes = [
#   { pattern = "govallecito.com/data/conditions.json", zone_name = "govallecito.com" },
#   { pattern = "www.govallecito.com/data/conditions.json", zone_name = "govallecito.com" }
# ]

# KV namespace for the cached conditions.json
# Create with:  npx wrangler kv namespace create CONDITIONS
# then paste the id below.
[[kv_namespaces]]
binding = "CONDITIONS"
id = "e98b1300cb02405cb6da4f417c51b80c"

# Non-secret config (safe to commit). Uncomment + fill when known:
[vars]
# URL of the committed restrictions.json on the live site; the worker reads it
# every cron to fold the editor's Stage 1/2 fire-ban toggle into the Alert tile.
RESTRICTIONS_URL = "https://govallecito-web.pages.dev/data/restrictions.json"
# Roads come from the COtrip v1 API (https://data.cotrip.org/api/v1/) using the
# COTRIP_KEY secret (set below). getRoads() reads incidents + roadConditions and
# filters to the Durango access corridor (US 550 / US 160). NOTE: the feed is capped
# at ~100 statewide segments with broken pagination, and Vallecito's true access road
# (US 160 Durango-Bayfield, then CR 501) is NOT a CDOT segment — so the roads tile is
# honestly scoped to "Durango-area highways," with cameras/511 for the final leg.
# (Legacy CDOT_ENDPOINT/CDOT_KEY vars are no longer used.)
# WU_STATION_ID (non-secret) — KCOBAYFI100 "Vallecito Reservoir", the marina station
# (replaced KCOBAYFI57, which was offline). WU_API_KEY (the marina's PWS read key) is a
# SECRET; with both set, getWeather prefers this station and falls back to NWS if it's
# stale (>90 min) or the key is rejected.
WU_STATION_ID = "KCOBAYFI100"

# Secrets (set with `npx wrangler secret put NAME` from this worker/ folder, never commit them):
#   COTRIP_KEY       CDOT/COtrip API key — POWERS getRoads() (set ✓, June 2026)
#   WU_API_KEY       free Weather Underground PWS key (from marina's WU member settings)
#   WU_STATION_ID    e.g. KCOBAYFI12  (or set as a [vars] entry above)
#   ACCUWEATHER_KEY  optional backup
#   AIRNOW_KEY       optional, air quality
