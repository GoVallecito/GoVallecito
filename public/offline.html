<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Offline — GoVallecito</title>
<meta name="theme-color" content="#1d3b2f">
<meta name="robots" content="noindex">
<style>
  :root{--pine:#1d3b2f;--lake:#2f7d8a;--cream:#f7f5f0;--ink:#22302b}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:var(--cream);color:var(--ink);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    padding:24px;text-align:center}
  .card{max-width:30rem}
  .mark{width:72px;height:72px;border-radius:18px;background:var(--pine);margin:0 auto 18px;
    display:flex;align-items:center;justify-content:center;font-size:34px}
  h1{font-size:1.5rem;margin:0 0 10px;color:var(--pine)}
  p{margin:0 0 18px;color:#4a5650}
  a.btn{display:inline-block;background:var(--pine);color:#fff;text-decoration:none;
    border-radius:999px;padding:11px 22px;font-weight:600}
  .muted{font-size:.85rem;color:#6b766f;margin-top:18px}
</style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">🏔️</div>
    <h1>You're offline</h1>
    <p>GoVallecito needs a connection to pull the latest lake conditions. Reconnect and try again — the last readings you saw are still on your device.</p>
    <a class="btn" href="/">Try again</a>
    <p class="muted">In an emergency, dial <a href="tel:911">911</a>.</p>
  </div>
</body>
</html>
